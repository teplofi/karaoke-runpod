# /etc/nginx/sites-available/karaoke.nonstopplay.ru
# Форму и обработку отдаёт FastAPI (127.0.0.1:8800),
# готовые караоке-страницы /<slug>/ раздаются статикой из /var/www/karaoke.
server {
    listen 80;
    server_name karaoke.nonstopplay.ru;

    client_max_body_size 30m;   # под загрузку mp3

    # форма загрузки
    location = / {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_read_timeout 700s;   # ждём RunPod (cold start)
    }
    location = /make {
        proxy_pass http://127.0.0.1:8800;
        proxy_set_header Host $host;
        proxy_read_timeout 700s;
    }
    location = /health {
        proxy_pass http://127.0.0.1:8800;
    }

    # готовые караоке-страницы (статика)
    location / {
        root /var/www/karaoke;
        try_files $uri $uri/ =404;
    }
}
